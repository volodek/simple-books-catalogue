<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <title>Simple books catalogue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
    <header>
      <h1>The Library</h1>
      <button class="theme-toggle">
        <span class="moon-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 h-5 w-5 text-gray-400 group-hover:text-gray-500 dark:text-gray-300 dark:group-hover:text-gray-300 text-gray-400 group-hover:text-gray-700" role="img" aria-labelledby="at4yburhcrsxitvz28rxpski65qik8tp"><title id="at4yburhcrsxitvz28rxpski65qik8tp">theme icon</title>
  <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"></path>
          </svg>
        </span>
        <span class="sun-icon hidden">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 h-5 w-5 text-gray-400 group-hover:text-gray-500 dark:text-gray-300 dark:group-hover:text-gray-300 text-gray-400 group-hover:text-gray-700" role="img" aria-labelledby="afrapvo33tky69wbwpi4wh5wktb338bl"><title id="afrapvo33tky69wbwpi4wh5wktb338bl">theme icon</title>
  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"></path>
          </svg>
        </span>
      </button>
    </header>
    <div class="hero-section">
      <div class="title-section">
        <h1>Discover Your Next Great Read</h1>
        <p>
          Search millions of books, build your personal library,
          and never lose track of what to read next.
        </p>
      </div>

      <div class="search-section">
        <input id="search-input" type="text" placeholder="Search for books by title or author...">
        <button id="search-button">Search</button>
      </div>
    </div>

    <div id="main-content">
      <div id="search-results">
        <div class="status-area">
          <div id="loader" class="hidden">Loading...</div>
          <div id="error-container" class="hidden"></div>
        </div>
      </div>

      <div id="favorites">
        <h2>My favorites</h2>
      </div>
    </div>
    <footer>
      <p>
        Powered by <a href="https://openlibrary.org" target="_blank">Open Library</a>
      </p>
    </footer>
    <button id="scroll-to-fav" class="hidden" aria-label="Go to favorites">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12.6667 9.33333C13.66 8.36 14.6667 7.19333 14.6667 5.66667C14.6667 4.69421 14.2804 3.76158 13.5928 3.07394C12.9051 2.38631 11.9725 2 11 2C9.82671 2 9.00004 2.33333 8.00004 3.33333C7.00004 2.33333 6.17337 2 5.00004 2C4.02758 2 3.09495 2.38631 2.40732 3.07394C1.71968 3.76158 1.33337 4.69421 1.33337 5.66667C1.33337 7.2 2.33337 8.36667 3.33337 9.33333L8.00004 14L12.6667 9.33333Z" stroke="#7C736A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </body>
</html>
